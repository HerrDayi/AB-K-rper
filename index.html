<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quader-Detektive</title>
    <style>
        :root {
            --primary: #000000;
            --success: #22c55e;
            --error: #dc2626;
            --bg: #ffffff;
            --card-bg: #f8fafc;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg); color: #1e293b; margin: 0; padding: 20px; }

        .container { max-width: 1100px; margin: 0 auto; padding-bottom: 100px; }

        header {
            text-align: center;
            border-bottom: 4px solid var(--primary);
            padding: 20px;
            margin-bottom: 40px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 2.2em; text-transform: uppercase; letter-spacing: 3px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .net-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s;
        }

        .net-svg {
            width: 260px;
            height: 220px;
            margin-bottom: 15px;
        }

        /* Quader Flächen-Farben */
        .face-a { fill: #3b82f6; stroke: #1e3a8a; stroke-width: 2; } /* Große Seiten */
        .face-b { fill: #fde047; stroke: #a16207; stroke-width: 2; } /* Deckel/Boden */
        .face-c { fill: #f87171; stroke: #991b1b; stroke-width: 2; } /* Kleine Seiten */

        .id-badge {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.85em;
        }

        select {
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            width: 100%;
            font-size: 15px;
            background: white;
            cursor: pointer;
        }

        .check-btn {
            margin-top: 12px;
            padding: 10px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .feedback {
            margin-top: 10px;
            font-weight: bold;
            display: none;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
        }

        .bonus-section {
            border: 4px dashed #cbd5e1;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            margin-top: 60px;
            background: #f1f5f9;
        }

        .bonus-btn {
            background: #059669;
            color: white;
            padding: 18px 40px;
            border: none;
            border-radius: 14px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .bonus-btn:hover { background: #10b981; }

        #bonus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        @media print {
            .bonus-section, .check-btn, .feedback, select { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🕵️‍♂️ Quader-Detektive</h1>
    </header>

    <div class="grid-container" id="net-grid"></div>

    <div class="bonus-section" id="bonus-area">
        <h2>Spezial-Archiv</h2>
        <p id="bonus-instruction">Hast du alle Standard-Fälle gelöst? Dann schalte hier die Bonus-Einsätze frei.</p>
        <button class="bonus-btn" id="unlock-btn">Alle Bonus-Fälle freischalten</button>
        <div id="bonus-grid"></div>
    </div>
</div>

<script>
    // 12 Standard-Netze
    const netsData = [
        { id: 1, type: 'valid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:1,t:'b'},{x:1,y:5,w:2,h:3,t:'a'},{x:0,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:1,h:3,t:'c'}]},
        { id: 2, type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:3,t:'a'},{x:1,y:7,w:2,h:3,t:'a'},{x:0,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:1,h:3,t:'c'}]},
        { id: 3, type: 'valid', faces: [{x:0,y:0,w:1,h:3,t:'c'},{x:1,y:0,w:2,h:3,t:'a'},{x:1,y:3,w:2,h:1,t:'b'},{x:3,y:1,w:2,h:1,t:'b'},{x:3,y:2,w:2,h:3,t:'a'},{x:5,y:2,w:1,h:3,t:'c'}]},
        { id: 4, type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:3,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:3,t:'a'},{x:0,y:1,w:1,h:3,t:'c'},{x:3,y:4,w:1,h:3,t:'c'}]},
        { id: 5, type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:3,y:0,w:2,h:1,t:'b'},{x:0,y:1,w:1,h:3,t:'c'},{x:1,y:1,w:2,h:3,t:'a'},{x:3,y:1,w:1,h:3,t:'c'},{x:4,y:1,w:2,h:3,t:'a'}]},
        { id: 6, type: 'valid', faces: [{x:0,y:1,w:2,h:3,t:'a'},{x:2,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:2,h:3,t:'a'},{x:5,y:1,w:1,h:3,t:'c'},{x:0,y:0,w:2,h:1,t:'b'},{x:3,y:4,w:2,h:1,t:'b'}]},
        { id: 7, type: 'invalid', faces: [{x:0,y:1,w:2,h:3,t:'a'},{x:2,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:2,h:3,t:'a'},{x:5,y:1,w:1,h:3,t:'c'},{x:6,y:1,w:2,h:3,t:'a'},{x:2,y:0,w:1,h:1,t:'b'}, {x:2,y:4,w:1,h:1,t:'b'}]},
        { id: 8, type: 'valid', faces: [{x:1,y:0,w:1,h:2,t:'c'},{x:2,y:0,w:3,h:2,t:'a'},{x:5,y:0,w:1,h:2,t:'c'},{x:2,y:2,w:3,h:1,t:'b'},{x:2,y:3,w:3,h:2,t:'a'},{x:2,y:5,w:3,h:1,t:'b'}]},
        { id: 9, type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:3,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:1,t:'b'},{x:0,y:1,w:1,h:3,t:'c'},{x:5,y:1,w:1,h:3,t:'c'}]},
        { id: 10, type: 'invalid', faces: [{x:1,y:0,w:3,h:1,t:'b'},{x:1,y:1,w:3,h:2,t:'a'},{x:1,y:3,w:3,h:1,t:'b'},{x:4,y:1,w:1,h:2,t:'c'},{x:0,y:1,w:1,h:2,t:'c'}]},
        { id: 11, type: 'valid', faces: [{x:0,y:0,w:2,h:1,t:'b'},{x:0,y:1,w:2,h:3,t:'a'},{x:2,y:1,w:1,h:3,t:'c'},{x:2,y:4,w:2,h:3,t:'a'},{x:4,y:4,w:1,h:3,t:'c'},{x:2,y:7,w:2,h:1,t:'b'}]},
        { id: 12, type: 'invalid', faces: [{x:0,y:0,w:2,h:3,t:'a'},{x:2,y:0,w:1,h:3,t:'c'},{x:0,y:3,w:2,h:1,t:'b'},{x:2,y:3,w:1,h:1,t:'c'},{x:3,y:0,w:2,h:3,t:'a'},{x:3,y:3,w:2,h:1,t:'b'}]}
    ];

    // 6 Bonus-Netze
    const bonusPool = [
        { id: 'b1', type: 'valid', faces: [{x:0,y:1,w:1,h:4,t:'a'},{x:1,y:1,w:2,h:4,t:'c'},{x:3,y:1,w:1,h:4,t:'a'},{x:4,y:1,w:2,h:4,t:'c'},{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:5,w:2,h:1,t:'b'}]},
        { id: 'b2', type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:1,t:'b'},{x:1,y:5,w:2,h:3,t:'a'},{x:0,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:2,h:3,t:'c'}]},
        { id: 'b3', type: 'valid', faces: [{x:0,y:1,w:3,h:2,t:'a'},{x:3,y:1,w:1,h:2,t:'c'},{x:4,y:1,w:3,h:2,t:'a'},{x:7,y:1,w:1,h:2,t:'c'},{x:3,y:0,w:1,h:1,t:'b'},{x:3,y:3,w:1,h:1,t:'b'}]},
        { id: 'b4', type: 'invalid', faces: [{x:0,y:0,w:2,h:3,t:'a'},{x:2,y:0,w:2,h:3,t:'a'},{x:0,y:3,w:2,h:1,t:'b'},{x:2,y:3,w:2,h:1,t:'b'},{x:4,y:0,w:1,h:3,t:'c'},{x:5,y:0,w:1,h:3,t:'c'}]},
        { id: 'b5', type: 'valid', faces: [{x:2,y:0,w:2,h:1,t:'b'},{x:2,y:1,w:2,h:3,t:'a'},{x:1,y:1,w:1,h:3,t:'c'},{x:0,y:1,w:2,h:3,t:'a'},{x:0,y:4,w:2,h:1,t:'b'},{x:3,y:4,w:1,h:3,t:'c'}]},
        { id: 'b6', type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:3,y:1,w:2,h:3,t:'a'},{x:5,y:1,w:2,h:3,t:'a'},{x:0,y:1,w:1,h:3,t:'c'},{x:1,y:4,w:2,h:1,t:'b'}]}
    ];

    function createNetSVG(faces) {
        const scale = 18;
        let maxX = 0, maxY = 0;
        faces.forEach(f => {
            maxX = Math.max(maxX, f.x + f.w);
            maxY = Math.max(maxY, f.y + f.h);
        });
        const width = (maxX * scale) + 40;
        const height = (maxY * scale) + 40;
        let svg = `<svg class="net-svg" viewBox="0 0 ${width} ${height}">`;
        faces.forEach(f => {
            svg += `<rect x="${f.x * scale + 20}" y="${f.y * scale + 20}" width="${f.w * scale}" height="${f.h * scale}" class="face-${f.t}" />`;
        });
        svg += `</svg>`;
        return svg;
    }

    function renderCard(net, index, targetId, isBonus = false) {
        const uniqueId = isBonus ? `bonus-${net.id}` : net.id;
        const card = document.createElement('div');
        card.className = 'net-card';
        card.innerHTML = `
            <div class="id-badge">${isBonus ? 'Spezial-Fall ' + index : 'Fall ' + (index + 1)}</div>
            ${createNetSVG(net.faces)}
            <select id="select-${uniqueId}">
                <option value="">Deine Einschätzung?</option>
                <option value="valid">✅ Lässt sich falten</option>
                <option value="invalid">❌ Funktioniert nicht</option>
            </select>
            <button class="check-btn" onclick="checkAnswer('${uniqueId}', '${net.type}')">Prüfen</button>
            <div id="feedback-${uniqueId}" class="feedback"></div>
        `;
        document.getElementById(targetId).appendChild(card);
    }

    function checkAnswer(id, correctType) {
        const userVal = document.getElementById(`select-${id}`).value;
        const fb = document.getElementById(`feedback-${id}`);
        fb.style.display = 'block';
        if (!userVal) {
            fb.innerHTML = "⚠️ Wähle erst eine Option!";
            fb.style.color = "#854d0e";
            fb.style.backgroundColor = "#fef9c3";
        } else if (userVal === correctType) {
            fb.innerHTML = "🌟 Richtig!";
            fb.style.color = "#166534";
            fb.style.backgroundColor = "#dcfce7";
        } else {
            fb.innerHTML = "🧐 Prüfe die Paare!";
            fb.style.color = "#991b1b";
            fb.style.backgroundColor = "#fee2e2";
        }
    }

    function unlockAllBonus() {
        const grid = document.getElementById('bonus-grid');
        const btn = document.getElementById('unlock-btn');
        const instruction = document.getElementById('bonus-instruction');

        // Alle Bonus-Netze rendern
        bonusPool.forEach((net, i) => {
            renderCard(net, i + 1, 'bonus-grid', true);
        });

        // Interface anpassen
        btn.style.display = 'none';
        instruction.innerText = "Alle Archiv-Fälle wurden freigeschaltet. Viel Erfolg beim Ermitteln!";
        
        // Sanftes Scrollen
        grid.scrollIntoView({ behavior: 'smooth' });
    }

    function init() {
        netsData.forEach((net, i) => renderCard(net, i, 'net-grid'));
        document.getElementById('unlock-btn').onclick = unlockAllBonus;
    }

    window.onload = init;
</script>
</body>
</html>
