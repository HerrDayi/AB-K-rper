<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quader-Detektive</title>
    <style>
        :root {
            --primary: #000000;
            --success: #22c55e;
            --error: #dc2626;
            --bg: #ffffff;
            --card-bg: #f8fafc;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        header {
            text-align: center;
            border-bottom: 4px solid var(--primary);
            padding: 10px;
            margin-bottom: 40px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 2em; text-transform: uppercase; letter-spacing: 2px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .net-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .net-svg {
            width: 240px;
            height: 200px;
            margin-bottom: 15px;
        }

        /* Quader Farben */
        .face-a { fill: #3b82f6; stroke: #1e3a8a; stroke-width: 2; } /* Große Flächen */
        .face-b { fill: #fde047; stroke: #a16207; stroke-width: 2; } /* Deckel/Boden */
        .face-c { fill: #f87171; stroke: #991b1b; stroke-width: 2; } /* Seitenflächen */

        .id-badge {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        select {
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 8px;
            width: 100%;
            font-size: 14px;
            margin-top: 8px;
            background: white;
        }

        .check-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #64748b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .check-btn:hover { background: #475569; }

        .feedback {
            margin-top: 8px;
            font-weight: bold;
            display: none;
            text-align: center;
            padding: 5px;
            border-radius: 4px;
        }

        .bonus-section {
            border: 4px dashed #94a3b8;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-top: 50px;
        }

        .bonus-btn {
            background: var(--success);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }

        #bonus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        @media print {
            .bonus-section, .check-btn, .feedback, select { display: none; }
            .grid-container { grid-template-columns: 1fr 1fr; }
            .net-card { border: 1px solid #000; break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Die Quader-Detektive</h1>
    </header>

    <div class="grid-container" id="net-grid"></div>

    <div class="bonus-section">
        <h3>Schon fertig? 🚀</h3>
        <p>Generiere ein zufälliges Bonus-Rätsel!</p>
        <button class="bonus-btn" onclick="generateBonus()">Extra-Fall erstellen</button>
        <div id="bonus-grid"></div>
    </div>
</div>

<script>
    const netsData = [
        // 1. Valid: Klassisches Kreuz
        { id: 1, type: 'valid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:1,t:'b'},{x:1,y:5,w:2,h:3,t:'a'},{x:0,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:1,h:3,t:'c'}]},
        
        // 2. Invalid: Zu lang (Überlappung der großen Flächen)
        { id: 2, type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:3,t:'a'},{x:1,y:7,w:2,h:3,t:'a'},{x:0,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:1,h:3,t:'c'}]},
        
        // 3. Valid (KORRIGIERT): Treppenform, Flächen-Paare berühren sich NICHT an Kanten
        { id: 3, type: 'valid', faces: [{x:0,y:0,w:1,h:3,t:'c'},{x:1,y:0,w:2,h:3,t:'a'},{x:1,y:3,w:2,h:1,t:'b'},{x:3,y:1,w:2,h:1,t:'b'},{x:3,y:2,w:2,h:3,t:'a'},{x:5,y:2,w:1,h:3,t:'c'}]},
        
        // 4. Invalid: Zwei gelbe Flächen nebeneinander (Überlappung)
        { id: 4, type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:3,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:3,t:'a'},{x:0,y:1,w:1,h:3,t:'c'},{x:3,y:4,w:1,h:3,t:'c'}]},
        
        // 5. Invalid: Deckel/Boden auf der gleichen Seite
        { id: 5, type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:3,y:0,w:2,h:1,t:'b'},{x:0,y:1,w:1,h:3,t:'c'},{x:1,y:1,w:2,h:3,t:'a'},{x:3,y:1,w:1,h:3,t:'c'},{x:4,y:1,w:2,h:3,t:'a'}]},
        
        // 6. Valid: Versetzte 3er-Reihen
        { id: 6, type: 'valid', faces: [{x:0,y:1,w:2,h:3,t:'a'},{x:2,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:2,h:3,t:'a'},{x:5,y:1,w:1,h:3,t:'c'},{x:0,y:0,w:2,h:1,t:'b'},{x:3,y:4,w:2,h:1,t:'b'}]},
        
        // 7. Invalid: Zu viele Flächen (7 statt 6)
        { id: 7, type: 'invalid', faces: [{x:0,y:1,w:2,h:3,t:'a'},{x:2,y:1,w:1,h:3,t:'c'},{x:3,y:1,w:2,h:3,t:'a'},{x:5,y:1,w:1,h:3,t:'c'},{x:6,y:1,w:2,h:3,t:'a'},{x:2,y:0,w:1,h:1,t:'b'}, {x:2,y:4,w:1,h:1,t:'b'}]},
        
        // 8. Valid: Kompakte Form
        { id: 8, type: 'valid', faces: [{x:1,y:0,w:1,h:2,t:'c'},{x:2,y:0,w:3,h:2,t:'a'},{x:5,y:0,w:1,h:2,t:'c'},{x:2,y:2,w:3,h:1,t:'b'},{x:2,y:3,w:3,h:2,t:'a'},{x:2,y:5,w:3,h:1,t:'b'}]},
        
        // 9. Invalid: Zwei große blaue Flächen an der Kante
        { id: 9, type: 'invalid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:3,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:1,t:'b'},{x:0,y:1,w:1,h:3,t:'c'},{x:5,y:1,w:1,h:3,t:'c'}]},
        
        // 10. Invalid: Nur 5 Flächen
        { id: 10, type: 'invalid', faces: [{x:1,y:0,w:3,h:1,t:'b'},{x:1,y:1,w:3,h:2,t:'a'},{x:1,y:3,w:3,h:1,t:'b'},{x:4,y:1,w:1,h:2,t:'c'},{x:0,y:1,w:1,h:2,t:'c'}]},
        
        // 11. Valid: Lange Form mit versetzten Flügeln
        { id: 11, type: 'valid', faces: [{x:0,y:0,w:2,h:1,t:'b'},{x:0,y:1,w:2,h:3,t:'a'},{x:2,y:1,w:1,h:3,t:'c'},{x:2,y:4,w:2,h:3,t:'a'},{x:4,y:4,w:1,h:3,t:'c'},{x:2,y:7,w:2,h:1,t:'b'}]},
        
        // 12. Invalid: T-Kreuzungspunkt-Fehler (Plus-Form mit falscher Anordnung)
        { id: 12, type: 'invalid', faces: [{x:0,y:0,w:2,h:3,t:'a'},{x:2,y:0,w:1,h:3,t:'c'},{x:0,y:3,w:2,h:1,t:'b'},{x:2,y:3,w:1,h:1,t:'c'},{x:3,y:0,w:2,h:3,t:'a'},{x:3,y:3,w:2,h:1,t:'b'}]}
    ];

    const bonusPool = [
        { type: 'invalid', faces: [{x:0,y:1,w:2,h:3,t:'a'},{x:2,y:1,w:2,h:3,t:'a'},{x:4,y:1,w:1,h:3,t:'c'},{x:5,y:1,w:1,h:3,t:'c'},{x:0,y:0,w:2,h:1,t:'b'},{x:0,y:4,w:2,h:1,t:'b'}]},
        { type: 'valid', faces: [{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:1,w:2,h:3,t:'a'},{x:1,y:4,w:2,h:1,t:'b'},{x:1,y:5,w:2,h:3,t:'a'},{x:3,y:1,w:1,h:3,t:'c'},{x:0,y:5,w:1,h:3,t:'c'}]},
        { type: 'valid', faces: [{x:0,y:1,w:1,h:3,t:'c'},{x:1,y:1,w:2,h:3,t:'a'},{x:3,y:1,w:1,h:3,t:'c'},{x:1,y:0,w:2,h:1,t:'b'},{x:1,y:4,w:2,h:3,t:'a'},{x:1,y:7,w:2,h:1,t:'b'}]}
    ];

    let bonusCount = 0;

    function createNetSVG(faces) {
        const scale = 20;
        let maxX = 0, maxY = 0;
        faces.forEach(f => {
            maxX = Math.max(maxX, f.x + f.w);
            maxY = Math.max(maxY, f.y + f.h);
        });
        const width = (maxX * scale) + 40;
        const height = (maxY * scale) + 40;
        
        let svg = `<svg class="net-svg" viewBox="0 0 ${width} ${height}">`;
        faces.forEach(f => {
            svg += `<rect x="${f.x * scale + 20}" y="${f.y * scale + 20}" width="${f.w * scale}" height="${f.h * scale}" class="face-${f.t}" />`;
        });
        svg += `</svg>`;
        return svg;
    }

    function renderCard(net, index, targetId) {
        const uniqueId = targetId === 'bonus-grid' ? `bonus-${index}` : net.id;
        const card = document.createElement('div');
        card.className = 'net-card';
        card.innerHTML = `
            <div class="id-badge">${targetId === 'bonus-grid' ? 'Bonus-Fall' : 'Fall ' + (index + 1)}</div>
            ${createNetSVG(net.faces)}
            <select id="select-${uniqueId}">
                <option value="">Einschätzung?</option>
                <option value="valid">✅ Geht!</option>
                <option value="invalid">❌ Geht nicht!</option>
            </select>
            <button class="check-btn" onclick="checkAnswer('${uniqueId}', '${net.type}')">Überprüfen</button>
            <div id="feedback-${uniqueId}" class="feedback"></div>
        `;
        document.getElementById(targetId).appendChild(card);
    }

    function checkAnswer(id, correctType) {
        const userVal = document.getElementById(`select-${id}`).value;
        const fb = document.getElementById(`feedback-${id}`);
        fb.style.display = 'block';
        if (!userVal) {
            fb.innerHTML = "Wähle erst etwas aus!";
            fb.style.color = "orange";
        } else if (userVal === correctType) {
            fb.innerHTML = "Richtig! 🌟";
            fb.style.color = "var(--success)";
        } else {
            fb.innerHTML = "Leider falsch. Überprüfe die Flächenpaare!";
            fb.style.color = "var(--error)";
        }
    }

    function generateBonus() {
        bonusCount++;
        const randomIndex = Math.floor(Math.random() * bonusPool.length);
        const net = bonusPool[randomIndex];
        renderCard(net, bonusCount, 'bonus-grid');
    }

    function init() {
        netsData.forEach((net, i) => renderCard(net, i, 'net-grid'));
    }

    window.onload = init;
</script>
</body>
</html>
